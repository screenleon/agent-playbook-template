name: Rule Governance

on:
  pull_request:
    paths:
      - "rules/**"
      - "project/**"
      - "docs/**"
      - "examples/**"
      - "prompt-budget.yml"
      - "CHANGELOG.md"
      - "scripts/lint-layered-rules.sh"
      - "scripts/lint-doc-consistency.sh"
  workflow_dispatch:

jobs:
  lint-layered-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run layered rules linter
        run: bash scripts/lint-layered-rules.sh

  lint-doc-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run documentation consistency linter
        run: bash scripts/lint-doc-consistency.sh
